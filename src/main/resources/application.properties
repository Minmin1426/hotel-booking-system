server.port=${PORT:8080}
spring.application.name=hotel-booking-system

# Active profile: local dev will override this, Render uses default 'prod'
spring.profiles.active=${SPRING_PROFILES_ACTIVE:prod}

# Database Configurations
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/hotel_booking}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=${DB_DRIVER:org.postgresql.Driver}

# JPA Config
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway config
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.locations=classpath:db/migration/{vendor}
spring.flyway.repair-on-migrate=true

# JWT Settings
jwt.secret=${JWT_SECRET_KEY:default-very-long-secret-key-32-chars-long-or-more-for-hs256-hashing-security-12345}
jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:86400}
jwt.refresh-token-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# Payment Settings
payment.gateway.secret=${PAYMENT_GATEWAY_SECRET:mock-gateway-secret-key-that-is-long-enough-for-hs256-hashing-1234567890}
stripe.api.key=${STRIPE_API_KEY:sk_test_mock_key}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:whsec_test}
stripe.success.url=${STRIPE_SUCCESS_URL:http://localhost:5173/payment-status}
stripe.cancel.url=${STRIPE_CANCEL_URL:http://localhost:5173/payment-status}

# CORS configuration
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

# Mail Settings (Gmail SMTP configuration)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

