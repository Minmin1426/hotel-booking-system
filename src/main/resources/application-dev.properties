spring.datasource.url=${DB_URL:jdbc:sqlserver://localhost:1433;databaseName=HotelBookingDB;encrypt=true;trustServerCertificate=true}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:sa}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA Config
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# Flyway config
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# JWT Settings
jwt.secret=${JWT_SECRET_KEY:default-very-long-secret-key-32-chars-long-or-more-for-hs256-hashing-security-12345}
# Access Token expiry: 24h = 86400 seconds
jwt.expiration-seconds=86400
# Refresh Token expiry: 7 days = 604800000 milliseconds
jwt.refresh-token-expiration=604800000

# Logging
logging.level.com.hotelbooking=DEBUG
logging.level.org.springframework.security=INFO
